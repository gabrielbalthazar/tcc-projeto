<div class="form-card">
  <h2>Criar conta</h2>
  <p class="subtitle">Escolha seu perfil e comece agora</p>

  <form [formGroup]="form" (ngSubmit)="enviaRequest()">
    <p class="role-label">Eu sou</p>
    <div class="role-selector">
      <button
      type="button"
      [class.selected]="role === 'editor'"
      (click)="setRole('editor')">
        <strong>Editor</strong>
        <span>Filmmaker / Editor</span>
      </button>
      <button
      type="button"
      [class.selected]="role === 'cliente'"
      (click)="setRole('cliente')">
        <strong>Cliente</strong>
        <span>Recebe entregas</span>
      </button>
    </div>

    <app-input-field
      formControlName="nome"
      label="Nome completo"
      type="text"
      placeholder="Seu nome">
    </app-input-field>

    <app-input-field
      formControlName="email"
      label="E-mail"
      type="email"
      prefixIcon="mail_outline"
      placeholder="seu@email.com">
    </app-input-field>

    <app-input-field
      formControlName="senha"
      label="Senha"
      type="password"
      prefixIcon="lock_outline"
      [minlength]="6"
      [maxlength]="12">
    </app-input-field>

    <button
    mat-flat-button
    type="submit"
    [disabled]="loading"
    class="submit-btn">
      <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
      <span *ngIf="!loading">Criar Conta →</span>
    </button>
  </form>
</div>
