<div class="tabs-container">
  <div class="tabs">
    <button [class.active]="tab === 'login'" (click)="tab = 'login'">Entrar</button>
    <button [class.active]="tab === 'register'" (click)="tab = 'register'">Criar Conta</button>
  </div>
  <app-login-form *ngIf="tab === 'login'"></app-login-form>
  <app-register-form *ngIf="tab === 'register'"></app-register-form>
</div>
